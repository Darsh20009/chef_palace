services:
  - type: web
    name: chef-palace
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: SMTP2GO_API_KEY
        sync: false
      - key: SMTP_FROM
        value: cafe@chefsplace.online
      - key: SMTP_USER
        value: Qirox
