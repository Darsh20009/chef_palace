    <script>
      (function() {
        var CLEAR_VERSION = 'br-replit-dev-2026-04-13-v1';
        var CLEAR_KEY = 'br_clear_version';
        try {
          if (localStorage.getItem(CLEAR_KEY) !== CLEAR_VERSION) {
            // 1. مسح كل الكوكيز
            document.cookie.split(';').forEach(function(cookie) {
              var name = cookie.split('=')[0].trim();
              if (name) {
                var expiry = 'expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                document.cookie = name + '=;' + expiry;
                document.cookie = name + '=;' + expiry + ';domain=' + location.hostname;

            if ('caches' in window) {

              });
            }
            // 3. إلغاء تسجيل الـ Service Workers القديمة
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {

            // 4. حفظ رقم الإصدار الجديد حتى لا يتكرر التنظيف
            localStorage.setItem(CLEAR_KEY, CLEAR_VERSION);
            // 5. إعادة تحميل الصفحة بعد التنظيف

          }
        } catch(e) {}
